<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>NOIR BAR</title>

<style>
:root{
--bg:#070707;
--panel:#111;
--text:#f4efe7;
--muted:#9b9286;
--gold:#c7a46a;
--line:rgba(199,164,106,.22);
}

*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}

body{
font-family:Georgia,"Yu Mincho",serif;
background:var(--bg);
color:var(--text);
line-height:1.9;
}

a{text-decoration:none;color:inherit;}

nav{
position:fixed;
top:0;left:0;right:0;
z-index:100;
display:flex;
justify-content:space-between;
align-items:center;
padding:22px 6vw;
background:rgba(7,7,7,.72);
backdrop-filter:blur(14px);
border-bottom:1px solid rgba(255,255,255,.06);
}

.logo{
font-size:13px;
letter-spacing:.24em;
color:var(--gold);
}

.nav{
display:flex;
gap:24px;
font-size:11px;
letter-spacing:.18em;
}

.hero{
min-height:100vh;
display:flex;
align-items:center;
padding:120px 6vw 80px;
background:
linear-gradient(90deg,rgba(0,0,0,.86),rgba(0,0,0,.34)),
url("https://images.unsplash.com/photo-1514933651103-005eec06c04b?q=80&w=1800&auto=format&fit=crop")
center/cover;
}

.hero-inner{
max-width:760px;
}

.kicker{
font-size:12px;
letter-spacing:.38em;
color:var(--gold);
margin-bottom:24px;
}

h1{
font-size:clamp(58px,10vw,132px);
font-weight:400;
line-height:.96;
letter-spacing:-.05em;
margin-bottom:32px;
}

.hero p{
max-width:560px;
color:#cfc4b5;
font-size:16px;
}

section{
padding:110px 6vw;
}

.section-head{
display:grid;
grid-template-columns:170px 1fr;
gap:50px;
margin-bottom:54px;
}

.label{
font-size:12px;
letter-spacing:.35em;
color:var(--gold);
}

h2{
font-size:clamp(40px,6vw,78px);
font-weight:400;
line-height:1.08;
letter-spacing:-.04em;
}

.concept-text{
max-width:760px;
margin-left:auto;
color:var(--muted);
font-size:17px;
}

.menu-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:24px;
}

.card{
background:linear-gradient(180deg,#141414,#0d0d0d);
border:1px solid var(--line);
padding:34px;
min-height:260px;
display:flex;
flex-direction:column;
justify-content:flex-end;
}

.card img{
width:100%;
height:240px;
object-fit:cover;
margin-bottom:24px;
filter:grayscale(.15) contrast(1.05);
}

.card h3{
font-size:28px;
font-weight:400;
color:var(--gold);
margin-bottom:8px;
}

.card p{
color:#bdb3a6;
}

.price{
margin-top:12px;
color:var(--gold);
}

.gallery{
display:grid;
grid-template-columns:1.2fr .8fr;
gap:18px;
}

.gallery img{
width:100%;
height:560px;
object-fit:cover;
filter:brightness(.82);
}

.info{
max-width:760px;
margin-left:auto;
border-top:1px solid var(--line);
}

.row{
display:grid;
grid-template-columns:150px 1fr;
gap:24px;
padding:22px 0;
border-bottom:1px solid var(--line);
}

.row div:first-child{
color:var(--gold);
font-size:12px;
letter-spacing:.2em;
}

.reserve{
background:#101010;
text-align:center;
}

.btn{
display:inline-block;
margin-top:26px;
padding:14px 36px;
border:1px solid var(--gold);
border-radius:999px;
color:var(--gold);
letter-spacing:.16em;
font-size:12px;
}

.btn:hover{
background:var(--gold);
color:#111;
}

footer{
padding:34px;
text-align:center;
font-size:12px;
color:#777;
}

@media(max-width:800px){
nav{
display:block;
padding:14px 18px;
}

.logo{
margin-bottom:8px;
}

.nav{
overflow-x:auto;
white-space:nowrap;
gap:16px;
font-size:11px;
}

.hero{
min-height:88vh;
padding:120px 22px 70px;
}

h1{
font-size:clamp(52px,16vw,82px);
}

section{
padding:76px 22px;
}

.section-head{
grid-template-columns:1fr;
gap:18px;
margin-bottom:34px;
}

.concept-text{
margin-left:0;
font-size:15px;
}

.menu-grid{
grid-template-columns:1fr;
}

.gallery{
grid-template-columns:1fr;
}

.gallery img{
height:340px;
}

.row{
grid-template-columns:1fr;
gap:6px;
}
}
</style>
</head>

<body>

<nav>
<div class="logo" id="shopNameNav">NOIR BAR</div>
<div class="nav">
<a href="#top">TOP</a>
<a href="menu.html">MENU</a>
<a href="#access">ACCESS</a>
<a href="#reserve">RESERVE</a>
</div>
</nav>

<header class="hero" id="top">
<div class="hero-inner">
<div class="kicker">PRIVATE COCKTAIL LOUNGE</div>
<h1 id="heroTitle">Night has<br>its own ritual.</h1>
<p id="heroText">静かな照明とクラフトカクテル。深夜に余韻を味わうためのバー。</p>
</div>
</header>

<section>
<div class="section-head">
<div class="label">CONCEPT</div>
<h2 id="conceptTitle">隠れ家で、夜を味わう。</h2>
</div>
<p class="concept-text" id="conceptText"></p>
</section>

<section>
<div class="section-head">
<div class="label">SIGNATURE</div>
<h2 id="recommendTitle">Signature Cocktails</h2>
</div>
<div class="menu-grid" id="menuGrid"></div>
</section>

<section>
<div class="section-head">
<div class="label">GALLERY</div>
<h2 id="galleryTitle">Atmosphere</h2>
</div>
<div class="gallery">
<img src="https://images.unsplash.com/photo-1514362545857-3bc16c4c7d1b?q=80&w=1400&auto=format&fit=crop">
<img src="https://images.unsplash.com/photo-1516997121675-4c2d1684aa3e?q=80&w=1400&auto=format&fit=crop">
</div>
</section>

<section id="access">
<div class="section-head">
<div class="label">ACCESS</div>
<h2>Information</h2>
</div>

<div class="info">
<div class="row"><div>ADDRESS</div><div id="address"></div></div>
<div class="row"><div>OPEN</div><div id="open"></div></div>
<div class="row"><div>CLOSED</div><div id="closed"></div></div>
</div>
</section>

<section class="reserve" id="reserve">
<div class="label">RESERVATION</div>
<h2 id="reserveTitle">席を予約する</h2>
<a id="lineBtn" class="btn">LINE予約</a>
</section>

<footer>© <span id="footerShopName">NOIR BAR</span></footer>

<script>
fetch('./data/site.json')
.then(res=>res.json())
.then(data=>{
const shopName=data.shopName||"NOIR BAR";
document.title=shopName;
document.getElementById("shopNameNav").textContent=shopName;
document.getElementById("footerShopName").textContent=shopName;

document.getElementById("heroTitle").innerHTML=(data.hero?.title||"").replace(/\n/g,"<br>");
document.getElementById("heroText").textContent=data.hero?.text||"";

if(data.hero?.image){
document.querySelector(".hero").style.background=
`linear-gradient(90deg,rgba(0,0,0,.86),rgba(0,0,0,.34)),url("${data.hero.image}") center/cover`;
}

document.getElementById("conceptTitle").textContent=data.concept?.title||"";
document.getElementById("conceptText").textContent=data.concept?.text||"";
document.getElementById("recommendTitle").textContent=data.recommend?.title||"";
document.getElementById("galleryTitle").textContent=data.gallery?.title||"";

document.getElementById("address").textContent=data.access?.address||"";
document.getElementById("open").textContent=data.access?.open||"";
document.getElementById("closed").textContent=data.access?.closed||"";
document.getElementById("reserveTitle").textContent=data.reserve?.title||"";

const lineBtn=document.getElementById("lineBtn");
if(data.reserve?.lineUrl){lineBtn.href=data.reserve.lineUrl;}else{lineBtn.style.display="none";}
});

fetch('./data/menu.json')
.then(res=>res.json())
.then(data=>{
const grid=document.getElementById("menuGrid");
grid.innerHTML="";
const items=data.categories?.[0]?.items||[];
items.sort((a,b)=>(a.order||0)-(b.order||0));

const defaultImages=[
"https://images.unsplash.com/photo-1514362545857-3bc16c4c7d1b?q=80&w=1200",
"https://images.unsplash.com/photo-1470337458703-46ad1756a187?q=80&w=1200",
"https://images.unsplash.com/photo-1514933651103-005eec06c04b?q=80&w=1200"
];

items.slice(0,3).forEach((item,index)=>{
const div=document.createElement("div");
div.className="card";
div.innerHTML=`
<img src="${item.image||defaultImages[index%defaultImages.length]}" alt="${item.name||""}">
<h3>${item.name||""}</h3>
<p>${item.description||""}</p>
<div class="price">${item.price||""}</div>
`;
grid.appendChild(div);
});
});
</script>

</body>
</html>
